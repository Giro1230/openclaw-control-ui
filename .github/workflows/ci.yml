name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & Integration Tests + Coverage
        run: npm run test:coverage
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-test-secret-replace-in-production' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:javascript"

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-e2e-secret' }}
          AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL || 'test@example.com' }}
          AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN || 'test-token' }}

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-e2e-secret' }}
          AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL || 'test@example.com' }}
          AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN || 'test-token' }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL || 'test@example.com' }}
          E2E_AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN || 'test-token' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
