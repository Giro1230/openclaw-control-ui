# OpenClaw Dashboard + Gateway
# 로컬: docker compose --profile local up -d
# 서버: docker compose --profile server up -d (Gateway 포함)
# 서버(대시보드만, Gateway는 외부): OPENCLAW_GATEWAY_URL 환경변수만 설정 후 server 프로필

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # ── 인증 (옵션 A: Supabase)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      # ── 인증 (옵션 B: env-auth) ← 둘 중 하나만 설정
      - AUTH_USERS=${AUTH_USERS:-}
      - AUTH_EMAIL=${AUTH_EMAIL:-}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - AUTH_ROLE=${AUTH_ROLE:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      # ── Gateway
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-gateway:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # ── 저장소 / i18n
      - AGENT_STORE_PATH=${AGENT_STORE_PATH:-/app/data/agents.json}
      - I18N_TIMEZONE=${I18N_TIMEZONE:-Asia/Seoul}
      # ── 관측성 (선택)
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - dashboard_data:/app/data
    profiles:
      - local
      - server

  # OpenClaw Gateway (로컬/서버에서 같은 네트워크로 사용)
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    ports:
      - "18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
    # 메모리 2GB 권장 (공식 문서)
    mem_limit: 2g
    profiles:
      - local
      - server

volumes:
  dashboard_data:
  openclaw_config:
